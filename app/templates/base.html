<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ProbResolve — Consumer Complaint Board for India{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              navy:   '#1F3B5C',
              green:  '#31AF77',
              orange: '#E8690A',
              slate:  '#607089',
              mist:   '#F4F8F7',
              smoke:  '#C8DEDD',
              ink:    '#111827',
            }
          }
        }
      }
    }
  </script>
  {% block head %}{% endblock %}
</head>
<body class="bg-brand-mist text-brand-ink min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-white border-b border-brand-smoke sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
      <a href="/" class="flex-shrink-0">
        <img src="/static/primary_logo.svg" alt="ProbResolve" class="h-12 w-auto" />
      </a>
      <span class="text-xs font-semibold text-brand-slate uppercase tracking-widest">Admin Panel</span>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-brand-navy mt-16 py-6 text-center text-sm text-white/50">
    ProbResolve &mdash; Consumer Complaint Board for India
  </footer>

</body>
</html>
