{% extends "base.html" %}
{% block title %}Page Not Found — ProbResolve{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
  <div class="text-6xl mb-4">🔍</div>
  <h1 class="text-3xl font-bold text-gray-800 mb-2">Page Not Found</h1>
  <p class="text-gray-500 mb-8 max-w-sm">
    We couldn't find the complaint or page you were looking for.
    It may have been removed or the link might be wrong.
  </p>
  <div class="flex gap-3">
    <a href="/" class="bg-red-600 hover:bg-red-700 text-white font-medium px-5 py-2.5 rounded transition-colors">
      Browse Complaints
    </a>
    <a href="/problems/new" class="border border-gray-300 hover:border-red-400 text-gray-700 font-medium px-5 py-2.5 rounded transition-colors">
      Post a Complaint
    </a>
  </div>
</div>
{% endblock %}
